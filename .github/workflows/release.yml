name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (must already exist, e.g. v1.0.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      TAG: ${{ github.event.inputs.tag || github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TAG }}

      - name: Verify tag matches plugin version
        run: |
          tag_version="${TAG#v}"
          plugin_version=$(jq -r .version plugins/rogue/.cursor-plugin/plugin.json)
          marketplace_version=$(jq -r '.plugins[] | select(.name == "rogue") | .version' .cursor-plugin/marketplace.json)
          echo "tag=$tag_version plugin.json=$plugin_version marketplace.json=$marketplace_version"
          if [ "$tag_version" != "$plugin_version" ]; then
            echo "::error::tag $TAG does not match plugin.json version $plugin_version"
            exit 1
          fi
          if [ "$tag_version" != "$marketplace_version" ]; then
            echo "::error::tag $TAG does not match marketplace.json version $marketplace_version"
            exit 1
          fi

      - name: Build per-OS tarballs
        run: bash scripts/build-release.sh

      - name: List artifacts
        run: ls -la dist/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "release $TAG already exists — uploading assets"
            gh release upload "$TAG" dist/*.tar.gz --clobber
          else
            gh release create "$TAG" \
              --title "$TAG" \
              --generate-notes \
              dist/*.tar.gz
          fi
